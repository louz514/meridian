# Meridian backend on Fly.io — the agent loop must run 24/7 (it IS the
# product's proof), so machines never auto-stop and at least one stays up.
app = "meridian402-api"
primary_region = "yyz"

[build]

[env]
  MERIDIAN_MCP_HOST = "0.0.0.0"
  MERIDIAN_MCP_PORT = "8787"
  MERIDIAN_DATA_DIR = "/data"
  X402_FACILITATOR_URL = "self"
  AGENT_THINK_INTERVAL_MS = "20000"

[http_service]
  internal_port = 8787
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

[[mounts]]
  source = "meridian_data"
  destination = "/data"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
